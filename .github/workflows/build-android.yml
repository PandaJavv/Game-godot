name: Build Godot Android APK

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"
  GODOT_RELEASE: "stable"
  EXPORT_NAME: "CosmicJumper"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore $HOME/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Cache Godot + templates
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-v4

      - name: Download Godot & export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          mkdir -p ~/godot-bin
          wget -q "${BASE_URL}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d ~/godot-bin/
          mv ~/godot-bin/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot
          wget -q "${BASE_URL}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O /tmp/templates.tpz
          TEMPLATE_DIR=~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          mkdir -p "$TEMPLATE_DIR"
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates/
          mv /tmp/godot-templates/templates/* "$TEMPLATE_DIR/"

      - name: Write Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' "$ANDROID_HOME" "$HOME" > ~/.config/godot/editor_settings-4.tres
          echo "=== Editor settings ==="
          cat ~/.config/godot/editor_settings-4.tres

      - name: Debug environment
        run: |
          echo "=== ANDROID_HOME ==="
          echo "$ANDROID_HOME"
          echo "=== Android SDK contents ==="
          ls $ANDROID_HOME/
          echo "=== Build tools ==="
          ls $ANDROID_HOME/build-tools/ || echo "No build-tools"
          echo "=== Platforms ==="
          ls $ANDROID_HOME/platforms/ || echo "No platforms"
          echo "=== Godot templates ==="
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/ | grep -i android
          echo "=== export_presets.cfg ==="
          cat export_presets.cfg
          echo "=== project.godot ==="
          cat project.godot
          echo "=== All project.godot files ==="
          find . -name "project.godot"

      - name: Remove duplicate project folder
        run: |
          # Remove any nested folder that contains another project.godot
          find . -mindepth 2 -name "project.godot" -exec dirname {} \; | xargs -I{} rm -rf {}
          echo "Remaining project.godot files:"
          find . -name "project.godot"

      - name: Fix export_presets.cfg
        run: |
          # Remove lines that require gradle build
          sed -i '/gradle_build\/min_sdk/d' export_presets.cfg
          sed -i '/gradle_build\/target_sdk/d' export_presets.cfg
          sed -i '/gradle_build\/export_format/d' export_presets.cfg
          sed -i 's/gradle_build\/use_gradle_build=true/gradle_build\/use_gradle_build=false/' export_presets.cfg
          echo "=== Fixed export_presets.cfg gradle section ==="
          grep "gradle" export_presets.cfg

      - name: Import project assets
        run: |
          mkdir -p export
          ~/godot-bin/godot --headless --path . --import 2>&1 || true
          echo "Import complete"

      - name: Export Debug APK
        run: |
          ~/godot-bin/godot --headless --path . --export-debug "Android" export/${{ env.EXPORT_NAME }}-debug.apk
          echo "Export exit code: $?"

      - name: Verify APK
        run: |
          ls -lh export/
          ls export/*.apk && echo "✅ Build successful!" || (echo "❌ No APK found!" && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: export/*.apk
          if-no-files-found: error
          retention-days: 60

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: export/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
